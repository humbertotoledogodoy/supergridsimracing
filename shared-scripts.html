<script>
  function toggleTheme(cb){document.body.classList.toggle('light',cb.checked);localStorage.setItem('sg-theme',cb.checked?'light':'dark');}
  (function(){const s=localStorage.getItem('sg-theme');if(s==='light'){document.body.classList.add('light');const t=document.getElementById('themeToggle');if(t)t.checked=true;}})();
  const menuItems=document.querySelectorAll('#navMenu > li[data-menu]');
  menuItems.forEach(item=>{const trigger=item.querySelector(':scope > a');trigger.addEventListener('click',e=>{const hasDD=item.querySelector('.dropdown');if(!hasDD)return;e.preventDefault();const isOpen=item.classList.contains('open');menuItems.forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');});});
  document.addEventListener('click',e=>{if(!e.target.closest('#navMenu'))menuItems.forEach(i=>i.classList.remove('open'));});
  function toggleDrawer(){document.getElementById('navDrawer').classList.toggle('open');}
  function toggleDrawerItem(btn){const sub=btn.nextElementSibling;const isOpen=sub.classList.contains('open');document.querySelectorAll('.drawer-sub.open').forEach(s=>s.classList.remove('open'));document.querySelectorAll('.drawer-toggle.active').forEach(b=>b.classList.remove('active'));if(!isOpen){sub.classList.add('open');btn.classList.add('active');}}
  const obs=new IntersectionObserver(entries=>{entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*80);obs.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
  window.addEventListener('scroll',()=>{
    const isLight=document.body.classList.contains('light');
    const nav=document.getElementById('nav');
    if(window.scrollY>50){
      nav.style.background=isLight?'rgba(255,255,255,1)':'rgba(11,12,14,1)';
    } else {
      nav.style.background='';
    }
  });
</script>
